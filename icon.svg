<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4C7EFF"/>
      <stop offset="50%" stop-color="#5B8DFF"/>
      <stop offset="100%" stop-color="#00B894"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- 圆角方形背景，渐变蓝绿 -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- 装饰：右上角光晕 -->
  <circle cx="430" cy="80" r="70" fill="#ffffff" opacity="0.08"/>
  <circle cx="60" cy="450" r="100" fill="#ffffff" opacity="0.06"/>

  <!-- 中央叶片：抽象的"健康/活力"象征 -->
  <g transform="translate(256 256)">
    <!-- 叶片阴影 -->
    <path d="M 0 -135 C 90 -90 130 -10 80 90 C 40 150 -40 150 -80 90 C -130 -10 -90 -90 0 -135 Z"
          fill="#000" opacity="0.12" transform="translate(2 6)" filter="url(#softShadow)"/>
    <!-- 主叶片 -->
    <path d="M 0 -135 C 90 -90 130 -10 80 90 C 40 150 -40 150 -80 90 C -130 -10 -90 -90 0 -135 Z"
          fill="url(#leafGrad)"/>
    <!-- 叶脉中线 -->
    <path d="M 0 -120 Q 5 -20 0 90" stroke="#4C7EFF" stroke-width="3" fill="none" opacity="0.35" stroke-linecap="round"/>
    <!-- 中心圆点 -->
    <circle cx="0" cy="20" r="22" fill="url(#dotGlow)"/>
    <circle cx="0" cy="20" r="10" fill="#4C7EFF" opacity="0.85"/>
  </g>

  <!-- 底部品牌字 -->
  <text x="256" y="455" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'SF Pro Display', sans-serif"
        font-size="56" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="6" opacity="0.95">TAYU</text>
</svg>
